{% extends "base.html" %}
{% block title %}Dashboard - SMM Panel{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold mb-0">Xin chào, {{ user.username }}</h3>
        <form method="post" action="/logout">
            <input type="hidden" name="csrf_token" value="{{ request.session.get('csrf_token') }}">
            <button class="btn btn-outline-danger btn-sm" type="submit">Đăng xuất</button>
        </form>
    </div>
    <div class="alert alert-info">
        Vai trò: <strong>{{ user.role.value }}</strong> — Đây là placeholder Dashboard,
        sẽ được thay thế đầy đủ ở Phase 2.
    </div>
</div>
{% endblock %}
