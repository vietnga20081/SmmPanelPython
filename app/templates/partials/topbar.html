<header class="topbar">
  <div class="topbar-left">
    <button class="sidebar-toggle" type="button" aria-label="Đóng/mở menu" aria-controls="sidebar" aria-expanded="false">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    <nav class="breadcrumb" aria-label="Breadcrumb">
      <span class="current" aria-current="page">{{ breadcrumb|default("Home") }}</span>
    </nav>
  </div>

  <div class="topbar-right">
    {% if user.role.value == "client" %}
    <span class="badge badge-teal" style="font-size:13px;padding:6px 12px">
      Số dư: {{ "{:,.0f}".format(user.balance) }} đ
    </span>
    {% endif %}

    <button class="tb-btn theme-toggle" type="button" title="Đổi giao diện sáng/tối" aria-label="Đổi giao diện sáng/tối" aria-pressed="false">
      <svg class="theme-icon-light" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
      <svg class="theme-icon-dark" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>

    <div class="simple-dropdown">
      <button class="tb-avatar" type="button" data-dropdown-toggle aria-label="Menu tài khoản" aria-haspopup="menu">
        {{ user.username[0]|upper }}
      </button>
      <div class="simple-dropdown-menu" data-dropdown-menu>
        <div class="simple-dropdown-header">
          Đăng nhập với vai trò <strong>{{ user.role.value }}</strong>
        </div>
        <div class="simple-dropdown-divider"></div>
        <form method="post" action="/logout">
          <input type="hidden" name="csrf_token" value="{{ request.session.get('csrf_token') }}">
          <button type="submit" class="simple-dropdown-item danger">Đăng xuất</button>
        </form>
      </div>
    </div>
  </div>
</header>
